cat > ~/dragon-browser/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Private Browser</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--tor-purple:#7d4698;--tor-dark:#420c5d;--tor-bg:#310a46;--green:#00ff41;--text:#fff;--font:'Segoe UI', sans-serif}
html,body{height:100vh;width:100vw;overflow:hidden;background:linear-gradient(180deg, var(--tor-dark) 0%, var(--tor-bg) 100%);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column}

/* Titlebar & Tabs */
#titlebar{height:38px;background:rgba(0,0,0,0.4);display:flex;align-items:center;padding:0 10px;gap:5px;-webkit-app-region:drag}
#tabs-container{display:flex;gap:4px;flex:1;overflow-x:auto;-webkit-app-region:no-drag}
.tab{padding:6px 15px;background:rgba(255,255,255,0.1);border-radius:8px 8px 0 0;font-size:12px;cursor:pointer;min-width:120px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;align-items:center}
.tab.active{background:var(--tor-purple);border-bottom:2px solid var(--green)}
.tab-close{margin-left:8px;opacity:0.5}
.tab-close:hover{opacity:1;color:#ff4444}
#new-tab-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 10px;-webkit-app-region:no-drag}

/* Navbar */
#navbar{height:50px;background:rgba(0,0,0,0.2);display:flex;align-items:center;padding:0 15px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;opacity:0.7}
#urlbar{flex:1;background:rgba(0,0,0,0.4);border:1px solid var(--tor-purple);border-radius:20px;color:#fff;padding:6px 18px;font-size:13px;outline:none}
#urlbar:focus{border-color:var(--green);box-shadow:0 0 10px rgba(0,255,65,0.2)}

/* Content */
#webviews{flex:1;position:relative}
webview{width:100%;height:100%;display:none;background:#fff}
webview.active{display:flex}

/* Home Screen */
#home-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
#home-screen.active{display:flex}
.dragon-logo{font-size:80px;margin-bottom:10px;filter:drop-shadow(0 0 15px var(--green))}
h1{font-size:38px;margin-bottom:5px}
.sub{color:var(--green);font-family:monospace;margin-bottom:30px;letter-spacing:2px}

.search-box{background:#fff;border-radius:30px;width:500px;padding:5px 20px;display:flex;align-items:center;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
.search-box input{flex:1;border:none;padding:12px;font-size:16px;outline:none;color:#333}
.search-box button{background:none;border:none;font-size:20px;cursor:pointer}

/* Bookmarks Bar */
#bookmarks-bar{height:30px;background:rgba(0,0,0,0.1);display:flex;align-items:center;padding:0 15px;gap:10px;font-size:11px}
.bm-item{color:#ccc;text-decoration:none;cursor:pointer}
.bm-item:hover{color:var(--green)}
</style>
</head>
<body>

<div id="titlebar">
  <div id="tabs-container"></div>
  <button id="new-tab-btn" onclick="createNewTab()">+</button>
  <div style="flex:1"></div>
  <button class="nav-btn" style="font-size:12px" onclick="window.electronAPI.close()">✕</button>
</div>

<div id="navbar">
  <button class="nav-btn" onclick="activeWV().goBack()">←</button>
  <button class="nav-btn" onclick="activeWV().goForward()">→</button>
  <button class="nav-btn" onclick="activeWV().reload()">↻</button>
  <input type="text" id="urlbar" placeholder="Search Privately..." onkeydown="if(event.key==='Enter') navigate(this.value)">
  <button class="nav-btn" onclick="addBookmark()">★</button>
</div>

<div id="bookmarks-bar"></div>

<div id="webviews">
  <div id="home-screen">
    <div class="dragon-logo">🐉</div>
    <h1>DRAGON PRIVATE</h1>
    <div class="sub">ENCRYPTED // ANONYMOUS</div>
    <form class="search-box" onsubmit="event.preventDefault(); navigate(document.getElementById('home-input').value)">
      <input type="text" id="home-input" placeholder="Search with DuckDuckGo..." autocomplete="off">
      <button type="submit">🔍</button>
    </form>
  </div>
</div>

<script>
let tabs = [];
let activeTabId = null;
let bookmarks = JSON.parse(localStorage.getItem('dragon_bookmarks') || '[]');

function createNewTab(url = null) {
  const id = Date.now();
  const wv = document.createElement('webview');
  wv.setAttribute('partition', 'persist:dragon');
  wv.style.display = 'none';
  document.getElementById('webviews').appendChild(wv);

  const tab = { id, wv, title: 'New Tab', isHome: !url };
  tabs.push(tab);

  wv.addEventListener('did-finish-load', () => {
    tab.title = wv.getTitle();
    tab.isHome = false;
    updateUI();
  });

  if(url) navigate(url, id);
  switchTab(id);
}

function switchTab(id) {
  activeTabId = id;
  tabs.forEach(t => {
    t.wv.classList.remove('active');
    t.wv.style.display = 'none';
  });
  
  const tab = tabs.find(t => t.id === id);
  const home = document.getElementById('home-screen');
  
  if(tab.isHome) {
    home.classList.add('active');
    document.getElementById('urlbar').value = '';
  } else {
    home.classList.remove('active');
    tab.wv.classList.add('active');
    tab.wv.style.display = 'flex';
    document.getElementById('urlbar').value = tab.wv.getURL();
  }
  updateUI();
}

function closeTab(id, e) {
  e.stopPropagation();
  const index = tabs.findIndex(t => t.id === id);
  tabs[index].wv.remove();
  tabs.splice(index, 1);
  if(tabs.length === 0) createNewTab();
  else switchTab(tabs[Math.max(0, index - 1)].id);
}

function navigate(val, id = activeTabId) {
  const tab = tabs.find(t => t.id === id);
  let url = val.trim();
  if(!url.startsWith('http')) {
    if(url.includes('.') && !url.includes(' ')) url = 'https://' + url;
    else url = 'https://duckduckgo.com/?q=' + encodeURIComponent(url);
  }
  tab.isHome = false;
  tab.wv.src = url;
  switchTab(id);
}

function updateUI() {
  const container = document.getElementById('tabs-container');
  container.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = `tab ${t.id === activeTabId ? 'active' : ''}`;
    el.innerHTML = `<span>${t.title}</span><span class="tab-close" onclick="closeTab(${t.id}, event)">✕</span>`;
    el.onclick = () => switchTab(t.id);
    container.appendChild(el);
  });

  const bmBar = document.getElementById('bookmarks-bar');
  bmBar.innerHTML = bookmarks.map(b => `<a class="bm-item" onclick="navigate('${b.url}')">${b.name}</a>`).join(' | ');
}

function addBookmark() {
  const tab = tabs.find(t => t.id === activeTabId);
  if(tab.isHome) return;
  bookmarks.push({ name: tab.wv.getTitle().substring(0,15), url: tab.wv.getURL() });
  localStorage.setItem('dragon_bookmarks', JSON.stringify(bookmarks));
  updateUI();
}

function activeWV() { return tabs.find(t => t.id === activeTabId).wv; }

// Start with one tab
createNewTab();
</script>
</body>
</html>
EOF
