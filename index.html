cat > ~/dragon-browser/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Browser - Private</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--tor-purple:#7d4698;--tor-dark:#420c5d;--tor-bg:#310a46;--text:#fff;--font:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif}
html,body{height:100vh;width:100vw;overflow:hidden;background:linear-gradient(180deg, var(--tor-dark) 0%, var(--tor-bg) 100%);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column}

#titlebar{height:38px;background:rgba(0,0,0,0.3);display:flex;align-items:center;padding:0 12px;gap:8px;-webkit-app-region:drag;user-select:none}
.win-btn{width:28px;height:28px;border:none;background:none;color:#ccc;cursor:pointer;-webkit-app-region:no-drag;font-size:14px}
.win-btn:hover{background:rgba(255,255,255,0.1);color:#fff}

#navbar{height:50px;background:rgba(0,0,0,0.2);display:flex;align-items:center;padding:0 15px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;opacity:0.7}
.nav-btn:hover{opacity:1}
#urlbar{flex:1;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;padding:6px 12px;font-size:13px;outline:none}

#webviews{flex:1;position:relative;display:flex;flex-direction:column}
webview{width:100%;flex:1;display:none;background:#fff}
webview.active{display:flex}

#home-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center}
#home-screen.active{display:flex}
.tor-logo{width:80px;height:80px;background:var(--tor-purple);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;box-shadow:0 0 30px rgba(125,70,152,0.4)}
h1{font-size:42px;font-weight:600;margin-bottom:10px;letter-spacing:1px}

.search-container{background:#fff;border-radius:10px;width:550px;padding:5px;display:flex;align-items:center;margin-top:30px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.ddg-logo{padding:0 15px;font-size:20px}
.search-container input{flex:1;border:none;padding:12px;font-size:16px;outline:none;color:#333}
.toggle-wrap{display:flex;align-items:center;gap:10px;padding-right:15px;color:#666;font-size:14px;border-left:1px solid #eee;margin-left:10px}

.status-msg{margin-top:25px;font-size:14px;opacity:0.8}
</style>
</head>
<body>
<div id="titlebar">
  <span style="flex:1; font-size:12px; opacity:0.6">New Tab</span>
  <button class="win-btn" onclick="window.electronAPI.minimize()">─</button>
  <button class="win-btn" onclick="window.electronAPI.maximize()">□</button>
  <button class="win-btn" onclick="window.electronAPI.close()">✕</button>
</div>
<div id="navbar">
  <button class="nav-btn" onclick="navBack()">←</button>
  <button class="nav-btn" onclick="navForward()">→</button>
  <button class="nav-btn" onclick="navReload()">↻</button>
  <input type="text" id="urlbar" placeholder="Search with DuckDuckGo or enter address" onkeydown="urlbarKey(event)">
</div>
<div id="webviews">
  <div id="home-screen" class="active">
    <div class="tor-logo">🌐</div>
    <h1>Explore. Privately.</h1>
    <form class="search-container" onsubmit="homeSearch(event)">
      <span class="ddg-logo">🦆</span>
      <input type="text" id="home-input" placeholder="Search with DuckDuckGo" autocomplete="off">
      <div class="toggle-wrap">
        <span>Onionize</span>
        <input type="checkbox" checked>
      </div>
    </form>
    <div class="status-msg">You’re ready for the world’s most private browsing experience.</div>
  </div>
</div>

<script>
let searchEngine='https://duckduckgo.com/?q='
const wv=document.createElement('webview')
wv.setAttribute('partition','persist:dragon')
document.getElementById('webviews').appendChild(wv)

function resolveUrl(q){
  q=q.trim(); if(!q)return null
  if(q.startsWith('http://')||q.startsWith('https://'))return q
  if(q.includes('.')&&!q.includes(' '))return 'https://'+q
  return searchEngine+encodeURIComponent(q)
}

function navigate(url){
  const target = resolveUrl(url)
  if(!target) return
  document.getElementById('home-screen').classList.remove('active')
  wv.style.display='flex'
  wv.src = target
  document.getElementById('urlbar').value = target
}

function homeSearch(e){
  e.preventDefault()
  navigate(document.getElementById('home-input').value)
}

function urlbarKey(e){
  if(e.key==='Enter') navigate(document.getElementById('urlbar').value)
}

function navBack(){wv.goBack()}
function navForward(){wv.goForward()}
function navReload(){wv.reload()}

wv.addEventListener('did-finish-load', () => {
  document.getElementById('urlbar').value = wv.getURL()
})
</script>
</body>
</html>
EOF
